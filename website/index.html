<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>普親精舍</title>
    <link rel="icon" type="image/png" href="/ChungTai_logo.png" />
    <link rel="apple-touch-icon" href="/ChungTai_logo.png" />
    <style>
      :root {
        --bg: #edeae6;
        --text: #1f1f1f;
        --accent: #6e1f49;
        --card: #f8f8f8;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 1040px;
        margin: 0 auto;
        text-align: center;
        padding: 44px 16px 48px;
      }

      .logo-mark {
        width: 96px;
        height: 136px;
        margin: 0 auto 4px;
        display: block;
        object-fit: contain;
      }

      .site-title {
        color: var(--accent);
        font-size: 38px;
        margin: 0 0 28px;
        letter-spacing: 2px;
      }

      .event-list {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin: 0 auto 34px;
        text-align: left;
        align-items: stretch;
      }

      .event-list > .empty {
        grid-column: 1 / -1;
        text-align: center;
        border-radius: 12px;
      }

      .event-card {
        display: flex;
        flex-direction: column;
        height: 100%;
        box-sizing: border-box;
        background: var(--card);
        color: var(--text);
        text-decoration: none;
        padding: 16px 14px 14px;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(110, 31, 73, 0.12);
        transition: box-shadow 0.2s ease, transform 0.15s ease;
      }

      .event-card:hover {
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        transform: translateY(-1px);
      }

      .event-card:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .event-card-title {
        font-size: 1.05rem;
        font-weight: 600;
        line-height: 1.45;
        margin: 0 0 8px;
        color: var(--text);
      }

      .event-card-deadline {
        font-size: 0.85rem;
        color: #555;
        line-height: 1.5;
        margin: 0 0 12px;
      }

      .event-card-deadline .event-deadline-label {
        color: #888;
        font-weight: 500;
        margin-right: 4px;
      }

      .event-card-cta {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--accent);
        padding-top: 10px;
        margin-top: auto;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        text-align: center;
        letter-spacing: 0.05em;
      }

      .event-card:hover .event-card-cta {
        text-decoration: underline;
      }

      .empty {
        color: #666;
        background: var(--card);
        padding: 18px 12px;
      }

      .footer-title {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 30px;
      }

      .footer-text {
        margin: 0 auto;
        font-size: 18px;
        color: #7a7a7a;
        line-height: 1.7;
        display: inline-block;
        text-align: left;
      }

      .footer-row {
        display: flex;
        align-items: baseline;
        gap: 2px;
      }

      .footer-label {
        width: auto;
        min-width: 2em;
      }

      @media (max-width: 900px) {
        .event-list {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 520px) {
        .event-list {
          grid-template-columns: 1fr;
        }

        .event-card-title {
          font-size: 1.1rem;
        }

        .event-card-deadline {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <img
        class="logo-mark"
        src="https://drive.google.com/uc?export=view&id=1WJj7YkoN19QdQJ9E8_lq5B1y8kJ-W_Wz"
        onerror="this.onerror=null;this.src='https://drive.google.com/thumbnail?id=1WJj7YkoN19QdQJ9E8_lq5B1y8kJ-W_Wz&sz=w600';"
        alt="普親精舍 Logo"
      />
      <h1 class="site-title">普親精舍-8月份活動</h1>

      <section id="eventList" class="event-list">
        <div class="empty">載入中...</div>
      </section>

      <footer>
        <h2 class="footer-title">普親精舍</h2>
        <p class="footer-text">
          <span class="footer-row"><span class="footer-label">地址</span>｜<span>新竹市東區學府路445號</span></span>
          <span class="footer-row"><span class="footer-label">電話</span>｜<span>(03)575-0777</span></span>
        </p>
      </footer>
    </main>

    <script>
      const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBl_WUSBO1XQYQrEYcGX1YDJRj9O53gef7tYGDsqUKVUKYYSfoT91jDEJuavczkE1-Qw/exec"; 

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // 🌟 超級無敵防呆日期解析器：手動拆解年月日，不論瀏覽器語系是什麼，都不會再解析錯誤！
      function parseDateTime(dateStr) {
        if (!dateStr) return null;
        if (dateStr instanceof Date) return dateStr;

        var s = String(dateStr).trim();

        // 偵測並處理中文「上午/下午」
        var isPm = s.indexOf("下午") !== -1;
        var isAm = s.indexOf("上午") !== -1;
        s = s.replace("上午", "").replace("下午", "").trim();

        // 將日期與時間分離
        var parts = s.split(/\s+/);
        if (parts.length === 0) return null;

        var datePart = parts[0];
        var timePart = parts[1] || "00:00:00";

        // 拆解年月日
        var dateSep = datePart.indexOf("-") !== -1 ? "-" : "/";
        var dParts = datePart.split(dateSep);
        if (dParts.length !== 3) return null;

        var year, month, day;
        if (dParts[0].length === 4) {
          // 格式：YYYY/MM/DD
          year = parseInt(dParts[0], 10);
          month = parseInt(dParts[1], 10) - 1;
          day = parseInt(dParts[2], 10);
        } else if (dParts[2].length === 4) {
          // 格式：MM/DD/YYYY 或 DD/MM/YYYY。試算表標準輸出皆為 MM/DD/YYYY
          month = parseInt(dParts[0], 10) - 1;
          day = parseInt(dParts[1], 10);
          year = parseInt(dParts[2], 10);
        } else {
          // 備用方案
          var d = new Date(dateStr);
          return isNaN(d.getTime()) ? null : d;
        }

        // 拆解時分秒
        var tParts = timePart.split(":");
        var hours = parseInt(tParts[0] || 0, 10);
        var minutes = parseInt(tParts[1] || 0, 10);
        var seconds = parseInt(tParts[2] || 0, 10);

        // 根據上午/下午補正小時數
        if (isPm && hours < 12) {
          hours += 12;
        } else if (isAm && hours === 12) {
          hours = 0;
        }

        var finalDate = new Date(year, month, day, hours, minutes, seconds);
        return isNaN(finalDate.getTime()) ? null : finalDate;
      }

      // 統一輸出格式為：YYYY/MM/DD HH:mm:ss
      function formatDisplayDate(dateInput) {
        var d = parseDateTime(dateInput);
        if (!d) return String(dateInput || "");
        var pad = function(n) { return n < 10 ? '0' + n : n; };
        return d.getFullYear() + '/' +
               pad(d.getMonth() + 1) + '/' +
               pad(d.getDate()) + ' ' +
               pad(d.getHours()) + ':' +
               pad(d.getMinutes()) + ':' +
               pad(d.getSeconds());
      }

      function fetchPublishedEventsFromSheet() {
        return new Promise(function (resolve, reject) {
          var url = APPS_SCRIPT_URL + "?page=api&action=frontList";

          fetch(url)
            .then(function (response) {
              if (!response.ok) throw new Error("網路連線失敗");
              return response.json();
            })
            .then(function (res) {
              var list = null;
              if (Array.isArray(res)) {
                list = res;
              } else if (res && Array.isArray(res.data)) {
                list = res.data;
              } else if (res && Array.isArray(res.records)) {
                list = res.records;
              }

              if (list) {
                var now = Date.now();
                var out = [];

                for (var i = 0; i < list.length; i++) {
                  var item = list[i];
                  if (!item) continue;

                  var name = item.name || item.Name || "";
                  var urlStr = item.url || item.Url || item.URL || "";
                  var publishAtVal = item.publishAt || item.PublishAt || "";
                  var unpublishAtVal = item.unpublishAt || item.unpublishAt || "";

                  if (!name || !urlStr) continue;

// === 1. 上架時間防呆處理 ===
var pAt;
if (!publishAtVal || typeof publishAtVal !== 'string' || publishAtVal.trim() === "" || publishAtVal.length < 5) {
    // 如果上架時間沒填、不是字串或太短（例如只有 "7/14"），預設成很久以前（代表立刻上架）
    pAt = new Date("2000-01-01"); 
} else {
    pAt = parseDateTime(publishAtVal);
    if (!pAt) pAt = new Date("2000-01-01"); // 如果解析失敗，同樣給予預設值
}

// === 2. 下架時間防呆處理 ===
var uAt;
if (!unpublishAtVal || typeof unpublishAtVal !== 'string' || unpublishAtVal.trim() === "" || unpublishAtVal.length < 5) {
    // 如果下架時間沒填（空字串），預設成很久以後（代表永不下架）
    uAt = new Date("2099-12-31"); 
} else {
    uAt = parseDateTime(unpublishAtVal);
    if (!uAt) uAt = new Date("2099-12-31"); // 如果解析失敗，同樣給予預設值
}

                  // 只有當現在時間介於上架與下架時間之間，才會顯示
                  if (pAt && uAt) {
                    if (now < pAt.getTime() || now > uAt.getTime()) {
                      continue; 
                    }
                  }

                  out.push({
                    name: name,
                    url: urlStr,
                    unpublishAt: formatDisplayDate(unpublishAtVal),
                    _sortTime: pAt ? pAt.getTime() : 0,
                  });
                }

                // 排序：最新上架排最前面
                out.sort(function (a, b) {
                  return b._sortTime - a._sortTime;
                });
                for (var j = 0; j < out.length; j++) delete out[j]._sortTime;

                resolve(out);
              } else {
                reject(new Error("無法識別的 API 資料格式"));
              }
            })
            .catch(function (err) {
              reject(err);
            });
        });
      }

      function renderEvents(events) {
        const list = document.getElementById("eventList");
        if (!events || events.length === 0) {
          list.innerHTML = '<div class="empty">目前沒有已上架活動</div>';
          return;
        }

// 使用 ES6 Template Literals 樣板字串，徹底免除單雙引號拼接可能導致的語法錯誤
        list.innerHTML = events
          .map(function (item) {
            // 先取得該活動原本的時間字串（如果不存在就給空字串）
            var displayDeadline = item.unpublishAt ? item.unpublishAt : "";

            return `
              <a class="event-card" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">
                <div class="event-card-title">${escapeHtml(item.name)}</div>
                <div class="event-card-deadline">
                  <span class="event-deadline-label">截止日</span>｜${escapeHtml(displayDeadline)}
                </div>
                <div class="event-card-cta">我要報名</div>
              </a>
            `;
          })
          .join("");
      }

      fetchPublishedEventsFromSheet()
        .then(renderEvents)
        .catch(function (err) {
          document.getElementById("eventList").innerHTML =
            `<div class="empty">載入失敗：${escapeHtml((err && err.message) || "請稍後再試")}</div>`;
        });
    </script>
  </body>
</html>
