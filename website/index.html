<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>普親精舍</title>
    <link rel="icon" type="image/png" href="/ChungTai_logo.png" />
    <link rel="apple-touch-icon" href="/ChungTai_logo.png" />
    <style>
      :root {
        --bg: #edeae6;
        --text: #1f1f1f;
        --accent: #6e1f49;
        --card: #f8f8f8;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 1040px;
        margin: 0 auto;
        text-align: center;
        padding: 44px 16px 48px;
      }

      .logo-mark {
        width: 96px;
        height: 136px;
        margin: 0 auto 4px;
        display: block;
        object-fit: contain;
      }

      .site-title {
        color: var(--accent);
        font-size: 38px;
        margin: 0 0 28px;
        letter-spacing: 2px;
      }

      .event-list {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin: 0 auto 34px;
        text-align: left;
        align-items: stretch;
      }

      .event-list > .empty {
        grid-column: 1 / -1;
        text-align: center;
        border-radius: 12px;
      }

      .event-card {
        display: flex;
        flex-direction: column;
        height: 100%;
        box-sizing: border-box;
        background: var(--card);
        color: var(--text);
        text-decoration: none;
        padding: 16px 14px 14px;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(110, 31, 73, 0.12);
        transition: box-shadow 0.2s ease, transform 0.15s ease;
      }

      .event-card:hover {
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        transform: translateY(-1px);
      }

      .event-card:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .event-card-title {
        font-size: 1.05rem;
        font-weight: 600;
        line-height: 1.45;
        margin: 0 0 8px;
        color: var(--text);
      }

      .event-card-deadline {
        font-size: 0.85rem;
        color: #555;
        line-height: 1.5;
        margin: 0 0 12px;
      }

      .event-card-deadline .event-deadline-label {
        color: #888;
        font-weight: 500;
        margin-right: 4px;
      }

      .event-card-cta {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--accent);
        padding-top: 10px;
        margin-top: auto;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        text-align: center;
        letter-spacing: 0.05em;
      }

      .event-card:hover .event-card-cta {
        text-decoration: underline;
      }

      .empty {
        color: #666;
        background: var(--card);
        padding: 18px 12px;
      }

      .footer-title {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 30px;
      }

      .footer-text {
        margin: 0 auto;
        font-size: 18px;
        color: #7a7a7a;
        line-height: 1.7;
        display: inline-block;
        text-align: left;
      }

      .footer-row {
        display: flex;
        align-items: baseline;
        gap: 2px;
      }

      .footer-label {
        width: auto;
        min-width: 2em;
      }

      @media (max-width: 900px) {
        .event-list {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 520px) {
        .event-list {
          grid-template-columns: 1fr;
        }

        .event-card-title {
          font-size: 1.1rem;
        }

        .event-card-deadline {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <img
        class="logo-mark"
        src="https://drive.google.com/uc?export=view&id=1WJj7YkoN19QdQJ9E8_lq5B1y8kJ-W_Wz"
        onerror="this.onerror=null;this.src='https://drive.google.com/thumbnail?id=1WJj7YkoN19QdQJ9E8_lq5B1y8kJ-W_Wz&sz=w600';"
        alt="普親精舍 Logo"
      />
      <h1 class="site-title">普親精舍</h1>

      <section id="eventList" class="event-list">
        <div class="empty">載入中...</div>
      </section>

      <footer>
        <h2 class="footer-title">普親精舍</h2>
        <p class="footer-text">
          <span class="footer-row"><span class="footer-label">地址</span>｜<span>新竹市東區學府路445號</span></span>
          <span class="footer-row"><span class="footer-label">電話</span>｜<span>(03)575-0777</span></span>
        </p>
      </footer>
    </main>

    <script>
      // ⚠️ 貼上你「後台登入/新增活動」在用的 Apps Script 網址（結尾必須是 /exec）
      const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBl_WUSBO1XQYQrEYcGX1YDJRj9O53gef7tYGDsqUKVUKYYSfoT91jDEJuavczkE1-Qw/exec"; 

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // 格式化顯示時間：把 ISO 字串或物件轉成一般中文易讀格式 (例如 2026/07/14 19:12:00)
      function formatDisplayDate(dateInput) {
        if (!dateInput) return "";
        var d = new Date(dateInput);
        if (isNaN(d)) return String(dateInput);
        var pad = function(n) { return n < 10 ? '0' + n : n; };
        return d.getFullYear() + '/' +
               pad(d.getMonth() + 1) + '/' +
               pad(d.getDate()) + ' ' +
               pad(d.getHours()) + ':' +
               pad(d.getMinutes()) + ':' +
               pad(d.getSeconds());
      }

      /** * 放棄脆弱的 gviz 查詢，直接向你的 Apps Script 請求活動列表 API 
       */
function fetchPublishedEventsFromSheet() {
        return new Promise(function (resolve, reject) {
          var url = APPS_SCRIPT_URL + "?page=api&action=frontList";

          fetch(url)
            .then(function (response) {
              if (!response.ok) throw new Error("網路連線失敗");
              return response.json();
            })
            .then(function (res) {
              // 【自動格式判定】
              var list = null;
              if (Array.isArray(res)) {
                // 如果回傳直接是陣列
                list = res;
              } else if (res && Array.isArray(res.data)) {
                // 如果包裹在 res.data 裡
                list = res.data;
              } else if (res && Array.isArray(res.records)) {
                // 如果包裹在 res.records 裡
                list = res.records;
              }

              if (list) {
                var now = Date.now();
                var out = [];

                for (var i = 0; i < list.length; i++) {
                  var item = list[i];
                  if (!item) continue;

                  // 為了相容不同的試算表欄位大小寫，做個轉換
                  var name = item.name || item.Name || "";
                  var urlStr = item.url || item.Url || item.URL || "";
                  var publishAtVal = item.publishAt || item.PublishAt || "";
                  var unpublishAtVal = item.unpublishAt || item.UnpublishAt || "";

                  if (!name || !urlStr) continue;

                  // 轉換時間
                  var pAt = new Date(publishAtVal);
                  var uAt = new Date(unpublishAtVal);

                  // 寬鬆防呆：如果沒有設定時間，或時間轉換失敗，依然允許它顯示（或你要改成嚴格比對也行）
                  if (!isNaN(pAt) && !isNaN(uAt)) {
                    if (now < pAt.getTime() || now > uAt.getTime()) continue;
                  }

                 out.push({
                 name: name,
                 url: urlStr,
                 unpublishAt: formatDisplayDate(unpublishAtVal), // 改成 unpublishAt
                 _sortTime: !isNaN(pAt) ? pAt.getTime() : 0,
                 });
                }

                // 排序
                out.sort(function (a, b) {
                  return b._sortTime - a._sortTime;
                });
                for (var j = 0; j < out.length; j++) delete out[j]._sortTime;

                resolve(out);
              } else {
                reject(new Error("無法識別的 API 資料格式"));
              }
            })
            .catch(function (err) {
              reject(err);
            });
        });
      }
      function renderEvents(events) {
        const list = document.getElementById("eventList");
        if (!events || events.length === 0) {
          list.innerHTML = '<div class="empty">目前沒有已上架活動</div>';
          return;
        }

        list.innerHTML = events
          .map(function (item) {
            return (
              '<a class="event-card" href="' +
              escapeHtml(item.url) +
              '" target="_blank" rel="noopener noreferrer">' +
              '<div class="event-card-title">' +
              escapeHtml(item.name) +
              "</div>" +
              '<div class="event-card-deadline"><span class="event-deadline-label">截止日</span>｜' +
              escapeHtml(item.unpublishAt || "") +
              '</div>' +
              '<div class="event-card-cta">我要報名</div>' +
              "</a>"
            );
          })
          .join("");
      }
      
      fetchPublishedEventsFromSheet()
        .then(renderEvents)
        .catch(function (err) {
          document.getElementById("eventList").innerHTML =
            '<div class="empty">載入失敗：' + escapeHtml((err && err.message) || "請稍後再試") + "</div>";
        });
    </script>
  </body>
</html>
